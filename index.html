<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Аватар Мейкер</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text: #1d1d1f;
      --border: #e8e8ed;
      --primary: #0071e3;
      --primary-hover: #0077ed;
      --text-muted: #86868b;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      --radius: 16px;
    }

    body.dark {
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text: #f5f5f7;
      --border: #2c2c2e;
      --primary: #0071e3;
      --primary-hover: #1480f0;
      --text-muted: #86868b;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    h2 {
      margin: 40px 0 24px 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
    }

    /* Зона загрузки */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      background-color: var(--card-bg);
      width: 100%;
      max-width: 440px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--primary);
      background-color: cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(1.01);
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .upload-text {
      font-size: 16px;
      font-weight: 500;
    }

    .upload-subtext {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Контейнер кроппера (Фикс для мобилок) */
    .crop-container {
      margin-top: 24px;
      width: 100%;
      max-width: 440px;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    /* Обязательная обертка для стабильной работы Cropper.js */
    .img-wrapper {
      width: 100%;
      max-height: 320px; 
      overflow: hidden;
      border-radius: 12px;
      background-color: #000;
      margin-bottom: 16px;
    }

    #image {
      display: block;
      max-width: 100%;
    }

    /* Превью */
    .previews {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 32px;
      width: 100%;
      max-width: 440px;
    }

    @media (max-width: 400px) {
      .previews {
        grid-template-columns: 1fr;
      }
    }

    .preview-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .avatar-holder {
      width: 140px;
      height: 140px;
      background: #e8e8ed;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      transition: background-color 0.3s;
    }

    body.dark .avatar-holder {
      background: #2c2c2e;
    }

    .avatar-holder.circle {
      border-radius: 50%;
    }

    /* Кнопки */
    .btn {
      width: 100%;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background-color: var(--primary);
      color: #fff;
      transition: all 0.2s ease;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background-color: var(--border);
      color: var(--text);
      margin-top: 8px;
    }
    
    body.dark .btn-secondary {
      background-color: #2c2c2e;
    }

    body.dark .btn-secondary:hover {
      background-color: #3a3a3c;
    }

    input[type="file"] {
      display: none;
    }

    /* Переключатель темы */
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      transform: rotate(15deg) scale(1.05);
    }
  </style>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" title="Сменить тему">🌙</button>

  <h2>Превью аватара</h2>

  <div class="upload-area" id="upload-area">
    <div class="upload-icon">📸</div>
    <div class="upload-text">Перетащите сюда фото</div>
    <div class="upload-subtext">или нажмите для выбора файла</div>
    <input type="file" id="upload-input" accept="image/*" />
  </div>

  <div class="crop-container" id="crop-container" style="display:none;">
    <div class="img-wrapper">
      <img id="image" alt="Редактирование" />
    </div>
    <button class="btn" id="crop-button">✨ Обрезать и посмотреть</button>
  </div>

  <div class="previews" id="previews" style="display:none;">
    <div class="preview-card">
      <div class="avatar-holder circle" id="circle-preview"></div>
      <button class="btn btn-secondary" id="download-circle">Получить круг</button>
    </div>
    <div class="preview-card">
      <div class="avatar-holder" id="square-preview"></div>
      <button class="btn btn-secondary" id="download-square">Получить квадрат</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script>
    const uploadArea = document.getElementById('upload-area');
    const uploadInput = document.getElementById('upload-input');
    const cropContainer = document.getElementById('crop-container');
    const image = document.getElementById('image');
    const cropButton = document.getElementById('crop-button');
    const circlePreview = document.getElementById('circle-preview');
    const squarePreview = document.getElementById('square-preview');
    const previews = document.getElementById('previews');
    const themeToggle = document.getElementById('theme-toggle');
    const downloadCircle = document.getElementById('download-circle');
    const downloadSquare = document.getElementById('download-square');

    let cropper;
    let currentImageData = null;

    uploadArea.addEventListener('click', () => uploadInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) loadImage(file);
    });

    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) loadImage(file);
    });

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        image.src = e.target.result;
        cropContainer.style.display = 'block';
        previews.style.display = 'none';

        if (cropper) cropper.destroy();
        
        // Настройки оптимизированы под мобильный тач-интерфейс
        cropper = new Cropper(image, {
          aspectRatio: 1,
          viewMode: 1,
          autoCropArea: 1,
          responsive: true,
          restore: false,
          guides: false,
          center: true,
          highlight: false,
          cropBoxMovable: true,
          cropBoxResizable: true,
          toggleDragModeOnDblclick: false
        });
      };
      reader.readAsDataURL(file);
    }

    cropButton.addEventListener('click', () => {
      if (!cropper) return;

      const canvas = cropper.getCroppedCanvas({
        width: 512,
        height: 512,
        imageSmoothingEnabled: true,
        imageSmoothingQuality: 'high',
      });

      currentImageData = canvas.toDataURL('image/png');

      circlePreview.style.backgroundImage = `url(${currentImageData})`;
      circlePreview.style.backgroundSize = 'cover';
      circlePreview.style.backgroundPosition = 'center';

      squarePreview.style.backgroundImage = `url(${currentImageData})`;
      squarePreview.style.backgroundSize = 'cover';
      squarePreview.style.backgroundPosition = 'center';

      previews.style.display = 'grid';
      previews.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    downloadCircle.addEventListener('click', () => {
      if (!currentImageData) return;
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');

      ctx.beginPath();
      ctx.arc(256, 256, 256, 0, 2 * Math.PI);
      ctx.closePath();
      ctx.clip();

      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, 512, 512);
        const dataURL = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = dataURL;
        link.download = 'avatar-circle.png';
        link.click();
      };
      img.src = currentImageData;
    });

    downloadSquare.addEventListener('click', () => {
      if (!currentImageData) return;
      const link = document.createElement('a');
      link.href = currentImageData;
      link.download = 'avatar-square.png';
      link.click();
    });

    // Умное переключение темы
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
